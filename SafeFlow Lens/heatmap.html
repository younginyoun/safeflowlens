<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeFlow Lens | Heatmap</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Leaflet 지도 CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      background: #070b14;
    }

    .heatmap-page {
      padding: 28px 8% 70px;
      min-height: 100vh;
      background:
        linear-gradient(rgba(5, 10, 20, 0.88), rgba(5, 10, 20, 0.95)),
        radial-gradient(circle at top right, #0b62ff55, transparent 35%);
    }

    .heatmap-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }

    .heatmap-header a {
      color: #cbd5e1;
      margin-left: 24px;
    }

    .heatmap-title {
      margin-bottom: 28px;
    }

    .heatmap-title p {
      color: #60a5fa;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .heatmap-title h1 {
      font-size: 46px;
      margin-bottom: 16px;
    }

    .heatmap-title .desc {
      max-width: 900px;
      font-size: 18px;
      color: #cbd5e1;
    }

    .heatmap-layout {
      display: grid;
      grid-template-columns: 1.5fr 0.6fr;
      gap: 24px;
      align-items: stretch;
    }

    #map {
      height: 680px;
      border-radius: 24px;
      border: 1px solid #1e40af;
      box-shadow: 0 0 40px #0b62ff33;
      overflow: hidden;
    }

    .side-panel {
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid #1e40af;
      border-radius: 24px;
      padding: 26px;
      color: #f8fafc;
    }

    .side-panel h2 {
      font-size: 26px;
      margin-bottom: 18px;
    }

    .metric {
      background: #111827;
      border: 1px solid #1e3a8a;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .metric span {
      display: block;
      color: #93c5fd;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .metric strong {
      font-size: 26px;
    }

    .legend {
      margin-top: 24px;
    }

    .legend h3 {
      margin-bottom: 12px;
      color: #60a5fa;
    }

    .legend-bar {
      height: 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, #22c55e, #facc15, #f97316, #ef4444);
      margin-bottom: 10px;
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      color: #cbd5e1;
      font-size: 13px;
    }

    .notice {
      margin-top: 22px;
      padding: 16px;
      border-radius: 14px;
      background: #1e293b;
      color: #cbd5e1;
      font-size: 14px;
    }

    @media (max-width: 1000px) {
      .heatmap-layout {
        grid-template-columns: 1fr;
      }

      #map {
        height: 520px;
      }

      .heatmap-title h1 {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <main class="heatmap-page">
    <header class="heatmap-header">
      <div class="logo">SafeFlow Lens</div>
      <nav>
        <a href="index.html">홈</a>
        <a href="heatmap.html">히트맵</a>
      </nav>
    </header>

    <section class="heatmap-title">
      <p>Risk Heatmap</p>
      <h1>생활시설 주변 교통위험도 히트맵</h1>
      <div class="desc">
        대전광역시 서구의 생활시설 데이터와 교통사고 다발지역 데이터를 행정동 기준으로 연결하고,
        사고다발지역 좌표를 기반으로 위험도 분포를 지도 위에 시각화했습니다.
      </div>
    </section>

    <section class="heatmap-layout">
      <div id="map"></div>

      <aside class="side-panel">
        <h2>히트맵 요약</h2>

        <div class="metric">
          <span>분석 지역</span>
          <strong>대전 서구</strong>
        </div>

        <div class="metric">
          <span>분석 방식</span>
          <strong>행정동 매칭</strong>
        </div>

        <div class="metric">
          <span>시각화 기준</span>
          <strong>위험도 점수</strong>
        </div>

        <div class="legend">
          <h3>위험도 범례</h3>
          <div class="legend-bar"></div>
          <div class="legend-labels">
            <span>낮음</span>
            <span>보통</span>
            <span>높음</span>
            <span>매우 높음</span>
          </div>
        </div>

        <div class="notice">
          본 히트맵은 특정 시설 앞의 실제 사고위험을 단정하는 것이 아니라,
          공공데이터를 바탕으로 생활권 단위의 상대적 위험도를 시각화한 프로토타입입니다.
        </div>
      </aside>
    </section>
  </main>

  <!-- Leaflet 지도 JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Heatmap 플러그인 -->
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <!-- R에서 생성한 히트맵 데이터 -->
  <script src="data/heatmap_points.js"></script>

  <script>
    const map = L.map("map").setView([36.3504, 127.3845], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    const heatData = heatmapPoints.map(point => [
      point.accident_latitude,
      point.accident_longitude,
      point.intensity
    ]);

    L.heatLayer(heatData, {
      radius: 35,
      blur: 25,
      maxZoom: 17,
      gradient: {
        0.2: "#22c55e",
        0.4: "#facc15",
        0.6: "#f97316",
        0.85: "#ef4444"
      }
    }).addTo(map);

    heatmapPoints.forEach(point => {
      const marker = L.circleMarker(
        [point.accident_latitude, point.accident_longitude],
        {
          radius: 6,
          color: "#60a5fa",
          fillColor: "#2563eb",
          fillOpacity: 0.85,
          weight: 2
        }
      ).addTo(map);

      marker.bindPopup(`
        <strong>${point.near_accident_area}</strong><br>
        사고 유형: ${point.accident_type}<br>
        평균 위험도: ${point.avg_risk.toFixed(2)}<br>
        사고건수: ${point.accident_count}<br>
        사상자수: ${point.casualty_count}
      `);
    });
  </script>
</body>
</html>
